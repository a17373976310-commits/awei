<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 绘图 - Nano Banana 2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/assets/index-ITyuKaVw.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-Bgfx3vBf.css">
</head>

<body>
    <div id="app">
        <header class="app-header">
            <h1
                style="font-size: 1.25rem; font-weight: 600; background: linear-gradient(to right, #fff, #a5b4fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                AI 创意工坊</h1>
            <nav class="mode-switch">
                <button id="btn-img-modify" class="nav-btn">图片修改</button>
                <button id="btn-txt2img" class="nav-btn active">文生图</button>
                <button id="btn-img2img" class="nav-btn">图生图</button>
            </nav>
        </header>

        <main class="main-content">
            <div class="workspace-container">
                <!-- Left Panel: Controls -->
                <aside class="left-panel">
                    <div id="controls-container">
                        <!-- Image Upload (Img2Img only) -->
                        <div id="group-image" class="control-group hidden">
                            <label>源图像</label>
                            <div class="upload-zone" id="upload-zone">
                                <div class="upload-content">
                                    <span class="icon">+</span>
                                    <p>拖拽或粘贴图像</p>
                                    <span class="sub-text">支持多图上传</span>
                                </div>
                                <input type="file" id="file-input" accept="image/*" multiple hidden>
                                <canvas id="mask-canvas"></canvas>
                            </div>
                            <!-- Thumbnail Gallery -->
                            <div id="upload-gallery" class="upload-gallery hidden"></div>
                        </div>

                        <!-- Model Selector -->
                        <div class="control-group">
                            <label>选择模型</label>
                            <select id="model-select" class="model-select">
                                <option value="comfly_nano_banana">Comfly Nano Banana 2 (官方源)</option>
                                <option value="nano_banana_official">Nano Banana (Google)</option>
                            </select>
                        </div>

                        <!-- API Key Input -->
                        <div class="control-group">
                            <label>API Key (可选)</label>
                            <input type="password" id="api-key-input" class="api-key-input"
                                placeholder="粘贴您的 API Key 以调用模型">
                        </div>

                        <!-- Scenario Selector -->
                        <div id="group-scenario" class="control-group">
                            <label>应用场景</label>
                            <div class="scenario-selector">
                                <button class="scenario-btn active" data-value="free_mode">通用模式</button>
                                <button class="scenario-btn" data-value="ecommerce">电商模式</button>
                            </div>

                            <!-- Sub-Scenario (Hidden by default) -->
                            <div id="sub-scenario-container" class="scenario-selector hidden"
                                style="margin-top: 0.5rem; flex-wrap: wrap;">
                                <button class="scenario-btn sub-btn active" data-value="taobao_main">淘宝主图</button>
                                <button class="scenario-btn sub-btn" data-value="creative_poster">创意海报</button>
                                <button class="scenario-btn sub-btn" data-value="amazon_white">亚马逊白底</button>
                                <button class="scenario-btn sub-btn" data-value="amazon_detail">亚马逊A+</button>
                                <button class="scenario-btn sub-btn" data-value="taobao_detail">淘宝详情</button>
                            </div>
                        </div>

                        <!-- Aspect Ratio -->
                        <div class="control-group">
                            <label>输出尺寸</label>
                            <div class="ratio-grid" id="ratio-grid">
                                <!-- Ratios injected by JS -->
                            </div>
                        </div>

                        <!-- Prompt -->
                        <div class="control-group">
                            <label>你的指令</label>
                            <textarea id="prompt-input" placeholder="例如：'把背景换成未来城市的夜景' 或 '添加复古滤镜'"></textarea>
                        </div>

                        <!-- Generate Button -->
                        <button id="generate-btn" class="primary-btn">
                            <span class="icon">✨</span> 应用编辑
                        </button>
                    </div>
                </aside>

                <!-- Right Panel: Preview -->
                <section class="right-panel">
                    <div id="preview-container" class="preview-area">
                        <div class="empty-state">
                            <span class="icon">✨</span>
                            <p>您生成的图像将显示在此处。</p>
                        </div>
                    </div>
                </section>
            </div>

            <!-- Bottom Panel: History -->
            <section class="history-section">
                <h3>历史记录</h3>
                <div class="history-list" id="history-list">
                    <!-- History items injected by JS -->
                    <div class="history-empty">你的生成历史将显示在这里</div>
                </div>
            </section>
        </main>

        <!-- History Detail Modal -->
        <div id="image-modal" class="modal hidden">
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <div class="modal-body">
                    <div class="modal-image-container">
                        <img id="modal-image" src="" alt="Full size">
                    </div>
                    <div class="modal-details">
                        <div class="detail-group">
                            <h4>优化后提示词</h4>
                            <p id="modal-optimized-prompt"></p>
                        </div>
                        <div class="detail-group">
                            <h4>原始提示词</h4>
                            <p id="modal-prompt"></p>
                        </div>
                        <div class="detail-group hidden" id="modal-original-image-group">
                            <h4>原始参考图</h4>
                            <img id="modal-original-image" src="" alt="Original">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
